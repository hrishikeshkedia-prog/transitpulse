name: Deploy Wardrobe App

on:
  push:
    branches: [claude/outfit-recommendation-app-5oQha, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wardrobe/client/package-lock.json

      - name: Build
        working-directory: wardrobe/client
        run: |
          npm install --include=dev
          npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: wardrobe/client/dist
