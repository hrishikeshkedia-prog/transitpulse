name: Deploy Wardrobe App

on:
  push:
    branches: [claude/outfit-recommendation-app-5oQha, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wardrobe/client/package-lock.json

      - name: Build
        working-directory: wardrobe/client
        run: |
          npm install --include=dev
          npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: wardrobe/client/dist

      - id: deployment
        uses: actions/deploy-pages@v4
