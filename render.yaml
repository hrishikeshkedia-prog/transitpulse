databases:
  - name: wardrobe-db
    databaseName: wardrobe
    user: wardrobe_user
    plan: free

services:
  - type: web
    name: my-wardrobe
    env: node
    rootDir: wardrobe
    buildCommand: "cd client && npm install && npm run build && cd ../server && npm install"
    startCommand: "node server/index.js"
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wardrobe-db
          property: connectionString
